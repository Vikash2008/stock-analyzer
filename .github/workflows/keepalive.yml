name: Keep Render Alive

on:
  schedule:
    - cron: "*/14 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://stock-analyzer-2nqw.onrender.com/health)
          echo "Response: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: got $STATUS instead of 200"
          fi
